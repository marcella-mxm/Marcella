<!doctype html><html lang="id"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MXM Premium Store</title><link rel="preconnect" href="https://fonts.googleapis.com/"><link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><style>:root{
  --bg:#03080f;--bg2:#060d1a;--card:#080f1e;--card2:#0b1427;
  --blue:#3b8eff;--blue-dim:#2070e0;--blue-dark:#0a2250;

  --text:#dce9ff;--text-dim:#6a8fbd;
  --font:'Inter',sans-serif;--font-d:'Bebas Neue',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(59,142,255,.025)1px,transparent 1px),linear-gradient(90deg,rgba(59,142,255,.025)1px,transparent 1px);
  background-size:52px 52px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 55% 35% at 50% 0%,rgba(59,142,255,.07) 0%,transparent 70%),
             radial-gradient(ellipse 35% 25% at 85% 85%,rgba(30,100,220,.05) 0%,transparent 60%);
  pointer-events:none;z-index:0}

/* LOADER */
#loader{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;
  justify-content:center;flex-direction:column;z-index:9999;transition:opacity .5s,visibility .5s}
#loader.hidden{opacity:0;visibility:hidden;pointer-events:none}
.ld-logo{font-family:var(--font-d);font-size:88px;color:#fff;letter-spacing:6px;
  text-shadow:0 0 40px rgba(59,142,255,.55),0 0 80px rgba(59,142,255,.25);

.ld-sub{margin-top:10px;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--blue);opacity:.7}
.ld-bar{margin-top:28px;width:160px;height:2px;background:var(--border2);border-radius:99px;overflow:hidden}
.ld-fill{height:100%;background:var(--blue);border-radius:99px;box-shadow:0 0 10px var(--blue);animation:ldBar 1.6s ease forwards}
@keyframes ldPulse{from{opacity:.75;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
@keyframes ldBar{from{width:0}to{width:100%}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* SCANLINE */
.scanline{position:fixed;inset:0;pointer-events:none;z-index:1;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(59,142,255,.012) 3px,rgba(59,142,255,.012) 4px)}

/* NAVBAR */
.navbar{position:fixed;top:14px;left:50%;transform:translateX(-50%);
  width:calc(100% - 32px);max-width:980px;z-index:100;
  background:rgba(3,8,15,.82);border:1px solid var(--border);border-radius:999px;
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  padding:10px 16px;display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 4px 24px rgba(0,0,0,.4)}
.nav-logo{display:flex;align-items:center;gap:10px}
.nav-icon{width:34px;height:34px;border-radius:9px;

  box-shadow:0 0 14px rgba(59,142,255,.4)}
.nav-brand{font-family:var(--font-d);font-size:20px;color:#fff;letter-spacing:2px}
.nav-links{display:flex;align-items:center;gap:2px}
.nav-link{padding:7px 14px;border-radius:999px;font-size:13px;font-weight:500;
  color:var(--text-dim);text-decoration:none;transition:all .2s;cursor:pointer;background:none;border:none}
.nav-link:hover{color:var(--blue);background:var(--glow)}
.nav-cta{padding:9px 22px;border-radius:999px;background:var(--blue);color:#fff;
  font-size:13px;font-weight:700;text-decoration:none;transition:all .2s;cursor:pointer;border:none;
  box-shadow:0 0 16px rgba(59,142,255,.3)}
.nav-cta:hover{transform:scale(1.04);box-shadow:0 0 28px rgba(59,142,255,.5)}
.nav-burger{display:none;width:36px;height:36px;border-radius:50%;
  background:var(--blue);border:none;cursor:pointer;
  flex-direction:column;align-items:center;justify-content:center;gap:4px}
.nav-burger span{display:block;width:14px;height:2px;background:#fff;border-radius:2px}

/* MOBILE MENU */
.mob-menu{position:fixed;inset:0;z-index:200;background:rgba(3,8,15,.97);

  transform:translateX(100%);transition:transform .32s cubic-bezier(.4,0,.2,1)}
.mob-menu.open{transform:translateX(0)}
.mob-top{display:flex;align-items:center;justify-content:space-between;
  padding:24px 0 20px;border-bottom:1px solid var(--border2);margin-bottom:32px}
.mob-logo{font-family:var(--font-d);font-size:26px;color:#fff;letter-spacing:3px}
.mob-logo b{color:var(--blue)}
.mob-close{width:38px;height:38px;border-radius:50%;background:var(--card2);
  border:1px solid var(--border2);color:var(--text);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.mob-item{display:flex;align-items:center;gap:14px;padding:16px 0;
  border-bottom:1px solid var(--border2);color:var(--text);font-size:17px;
  font-weight:600;cursor:pointer;text-decoration:none;transition:color .2s}
.mob-item:hover{color:var(--blue)}
.mob-ic{width:38px;height:38px;border-radius:10px;background:var(--card2);
  border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:16px}

/* LAYOUT */
.content{position:relative;z-index:2;padding-top:90px}
.wrap{max-width:980px;margin:0 auto;padding:0 20px}
.section{padding:80px 0}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent)}

/* SECTION LABELS */
.s-label{display:flex;align-items:center;gap:10px;font-size:11px;letter-spacing:3px;
  text-transform:uppercase;color:var(--blue);margin-bottom:14px;font-weight:700}
.s-label::before{content:'';width:20px;height:2px;background:var(--blue);border-radius:2px}
.s-title{font-family:var(--font-d);font-size:clamp(38px,6vw,60px);color:#fff;
  line-height:1.05;margin-bottom:14px;letter-spacing:1px}
.s-title .ac{color:var(--blue)}
.s-desc{font-size:15px;color:var(--text-dim);line-height:1.75;max-width:520px}

/* HERO */
.hero{padding:56px 0 80px;text-align:center}
.hero-badge{display:inline-flex;align-items:center;gap:8px;padding:7px 18px;
  border:1px solid var(--border);border-radius:999px;background:var(--glow);

  color:var(--blue);margin-bottom:28px}
.hero-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);

.hero-h1 .sub{color:var(--blue);display:block;text-shadow:0 0 50px rgba(59,142,255,.45)}
.hero-rule{display:flex;align-items:center;justify-content:center;gap:14px;margin:22px 0 14px}
.hero-rule::before,.hero-rule::after{content:'';flex:1;max-width:72px;height:1px;background:var(--border2)}
.hero-rule span{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim)}
.hero-p{font-size:15px;color:var(--text-dim);line-height:1.75;max-width:520px;margin:0 auto 36px}
.hero-p strong{color:var(--text)}
.hero-btns{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:52px}

/* BUTTONS */
.btn-p{padding:13px 30px;border-radius:12px;background:var(--blue);color:#fff;
  font-size:13px;font-weight:700;letter-spacing:.4px;text-decoration:none;border:none;cursor:pointer;
  display:inline-flex;align-items:center;gap:8px;
  box-shadow:0 0 24px rgba(59,142,255,.25);transition:all .22s}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 0 36px rgba(59,142,255,.45)}
.btn-o{padding:13px 30px;border-radius:12px;background:transparent;color:var(--text);
  font-size:13px;font-weight:700;letter-spacing:.4px;text-decoration:none;
  border:1px solid var(--border);cursor:pointer;
  display:inline-flex;align-items:center;gap:8px;transition:all .22s}
.btn-o:hover{background:var(--glow);border-color:var(--blue);color:var(--blue);transform:translateY(-2px)}

/* STATS */
.stats{display:flex;justify-content:center;gap:52px;flex-wrap:wrap;
  border-top:1px solid var(--border2);padding-top:44px}
.stat{text-align:center}
.stat-v{font-family:var(--font-d);font-size:44px;color:#fff;line-height:1}
.stat-v b{color:var(--blue)}
.stat-l{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-top:6px}

/* FEATURES */
.feat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(285px,1fr));gap:14px;margin-top:44px}
.feat-card{background:var(--card);border:1px solid var(--border2);border-radius:18px;
  padding:26px;position:relative;overflow:hidden;transition:all .28s}
.feat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--blue),transparent);opacity:0;transition:opacity .3s}
.feat-card:hover{border-color:var(--border);transform:translateY(-3px);background:var(--card2);
  box-shadow:0 14px 36px rgba(0,0,0,.28),0 0 16px rgba(59,142,255,.06)}
.feat-card:hover::after{opacity:1}
.feat-ic{width:48px;height:48px;border-radius:12px;background:var(--card2);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:18px}
.feat-n{font-size:10px;letter-spacing:2px;color:var(--blue);font-weight:700;margin-bottom:8px}
.feat-h{font-size:15px;font-weight:700;color:#fff;margin-bottom:8px}
.feat-d{font-size:13px;color:var(--text-dim);line-height:1.65}
.feat-tag{display:inline-block;margin-top:14px;padding:3px 10px;background:var(--glow);
  border:1px solid var(--border);border-radius:5px;font-size:10px;letter-spacing:1px;
  text-transform:uppercase;color:var(--blue);font-weight:700}

/* HOW */
.how-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;margin-top:44px}
.how-card{background:var(--card);border:1px solid var(--border2);border-radius:18px;
  padding:28px 24px;text-align:center;transition:all .28s}
.how-card:hover{border-color:var(--border);transform:translateY(-3px)}
.how-num{font-family:var(--font-d);font-size:52px;color:var(--blue);opacity:.25;line-height:1;margin-bottom:14px}
.how-t{font-size:14px;font-weight:700;color:#fff;margin-bottom:8px}
.how-d{font-size:13px;color:var(--text-dim);line-height:1.65}

/* PRICING */
.price-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(215px,1fr));gap:14px;margin-top:44px}
.price-card{background:var(--card);border:1px solid var(--border2);border-radius:20px;
  padding:26px;position:relative;overflow:hidden;transition:all .28s}
.price-card:hover{transform:translateY(-3px);box-shadow:0 18px 36px rgba(0,0,0,.3)}
.price-card.pop{border-color:var(--blue);background:var(--card2);box-shadow:0 0 24px rgba(59,142,255,.08)}
.price-card.pop::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--blue)}
.pop-badge{position:absolute;top:14px;right:14px;padding:3px 11px;background:var(--blue);color:#fff;
  font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;border-radius:5px}
.pr-dur{font-family:var(--font-d);font-size:30px;color:#fff;letter-spacing:1px;margin-bottom:4px}
.pr-tier{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:22px}
.pr-old{font-size:13px;color:var(--text-dim);text-decoration:line-through;margin-bottom:2px}
.pr-price{font-family:var(--font-d);font-size:38px;color:#fff;line-height:1;margin-bottom:4px}
.price-card.pop .pr-price{color:var(--blue)}

  border-radius:5px;font-size:10px;color:var(--blue);font-weight:700;margin-bottom:22px}
.pr-list{list-style:none;margin-bottom:24px}

.pr-list li:last-child{border-bottom:none}
.pr-list li::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--blue);flex-shrink:0}
.pr-btn{display:block;width:100%;padding:12px;border-radius:11px;font-size:13px;font-weight:700;

.pr-btn-p{background:var(--blue);color:#fff;box-shadow:0 0 18px rgba(59,142,255,.22)}

.pr-btn-o{background:transparent;color:var(--text);border:1px solid var(--border)}

/* FAQ */
.faq-list{margin-top:44px;display:flex;flex-direction:column;gap:8px}
.faq-item{background:var(--card);border:1px solid var(--border2);border-radius:14px;overflow:hidden;transition:border-color .2s}
.faq-item.open{border-color:var(--border)}
.faq-btn{width:100%;padding:18px 22px;display:flex;align-items:center;justify-content:space-between;gap:14px;

  font-size:14px;font-weight:600;font-family:var(--font);transition:color .2s}
.faq-btn:hover,.faq-item.open .faq-btn{color:var(--blue)}

.soc-list{margin-top:44px;display:flex;flex-direction:column;gap:10px}
.soc-item{display:flex;align-items:center;gap:16px;padding:17px 20px;

.soc-item:hover .soc-ic{background:var(--glow);border-color:var(--blue)}

.soc-handle{font-size:12px;color:var(--text-dim);margin-top:2px}
.soc-arr{color:var(--text-dim);font-size:15px;margin-left:auto;transition:all .22s}
.soc-item:hover .soc-arr{color:var(--blue);transform:translateX(3px)}

.contact-card{background:var(--card2);border:1px solid var(--border);border-radius:20px;

.ct-sub{font-size:11px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-top:3px}
.ct-rows{margin-top:18px;display:flex;flex-direction:column;gap:10px}
.ct-row{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text-dim)}
.ct-row strong{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text);min-width:68px}
.ct-btns{display:flex;gap:12px;flex-wrap:wrap;margin-top:22px}

/* FOOTER */
.footer{padding:40px 20px;text-align:center;max-width:980px;margin:0 auto}
.ft-logo{font-family:var(--font-d);font-size:30px;color:#fff;letter-spacing:3px;margin-bottom:6px}
.ft-logo b{color:var(--blue)}
.ft-sub{font-size:12px;color:var(--text-dim);margin-bottom:20px}
.ft-copy{font-size:11px;color:var(--text-dim);opacity:.45}

/* SOLD & SCROLL TOP */
.sold{position:fixed;left:16px;bottom:16px;z-index:50;background:var(--card2);
  border:1px solid var(--border);border-radius:12px;padding:11px 16px;
  font-size:12px;font-weight:600;color:var(--text);
  display:flex;align-items:center;gap:8px;backdrop-filter:blur(12px);
  box-shadow:0 4px 18px rgba(0,0,0,.3)}
.sold-dot{width:7px;height:7px;border-radius:50%;background:var(--blue);
  box-shadow:0 0 7px var(--blue);animation:blink 1.6s infinite;flex-shrink:0}
.sold b{color:var(--blue)}
.scroll-top{position:fixed;right:20px;bottom:20px;z-index:50;width:42px;height:42px;
  border-radius:50%;background:var(--blue);color:#fff;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:18px;
  box-shadow:0 0 18px rgba(59,142,255,.3);transition:all .25s;opacity:0;transform:translateY(10px)}
.scroll-top.show{opacity:1;transform:translateY(0)}
.scroll-top:hover{box-shadow:0 0 28px rgba(59,142,255,.5);transform:translateY(-2px)}

@media(max-width:768px){
  .nav-links,.nav-cta{display:none}
  .nav-burger{display:flex}
  .contact-card{flex-direction:column}
  .sold{display:none}
